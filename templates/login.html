{% extends "base_public.html" %}
{% block title %}Login{% endblock %}

{% block content %}
<div class="max-w-md mx-auto bg-white/60 backdrop-blur rounded-3xl shadow-lg p-8">
  <h1 class="text-3xl font-bold text-center">Admin Login</h1>

  <p class="text-center text-sm opacity-70 mt-2">
   Authorized administrators only.
  </p>

<form method="POST" class="mt-8 space-y-5">
  {% csrf_token %}

  {% if messages %}
  <div class="mb-4">
    {% for message in messages %}
      <div
        class="text-sm text-center
               text-red-600
               rounded-2xl px-4 py-3
               bg-red-50/80
               border border-red-200
               shadow-inner">
        {{ message }}
      </div>
    {% endfor %}
  </div>
{% endif %}


  <div>
    <label class="text-sm font-medium">Username</label>
    <input
      type="text"
      name="username"
      class="mt-1 w-full rounded-2xl p-4 bg-white shadow-inner outline-none focus:ring-2 focus:ring-[#F4A261]/60"
      placeholder="Enter username"
      required
    />
  </div>

  <div>
    <label class="text-sm font-medium">Password</label>
    <input
      type="password"
      name="password"
      class="mt-1 w-full rounded-2xl p-4 bg-white shadow-inner outline-none focus:ring-2 focus:ring-[#F4A261]/60"
      placeholder="Enter password"
      required
    />
  </div>

  <button
    type="submit"
    class="w-full py-4 rounded-3xl bg-[#F4A261] hover:bg-[#E76F51] text-white font-semibold shadow-lg transition"
  >
    Login
  </button>

  <a href="{% url 'landing' %}" class="block text-center text-sm opacity-70 hover:opacity-100">
    ← Back to Home
  </a>
</form>


</div>
{% endblock %}
